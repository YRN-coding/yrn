global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'aquapool-services'
    static_configs:
      - targets:
          - 'host.docker.internal:3001'  # auth-service
          - 'host.docker.internal:3002'  # user-service
          - 'host.docker.internal:3003'  # wallet-service
          - 'host.docker.internal:3004'  # exchange-service
          - 'host.docker.internal:3005'  # market-data-service
          - 'host.docker.internal:3006'  # remittance-service
          - 'host.docker.internal:3007'  # earn-service
          - 'host.docker.internal:3008'  # compliance-service
          - 'host.docker.internal:3009'  # notification-service
    metrics_path: /metrics
    scrape_interval: 10s

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
