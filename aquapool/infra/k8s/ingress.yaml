apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aquapool-ingress
  namespace: aquapool
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.aquapool.io
        - app.aquapool.io
      secretName: aquapool-tls
  rules:
    - host: api.aquapool.io
      http:
        paths:
          - path: /api/v1/auth
            pathType: Prefix
            backend:
              service:
                name: auth-service
                port:
                  number: 3001
          - path: /api/v1/users
            pathType: Prefix
            backend:
              service:
                name: user-service
                port:
                  number: 3002
          - path: /api/v1/wallets
            pathType: Prefix
            backend:
              service:
                name: wallet-service
                port:
                  number: 3003
          - path: /api/v1/market
            pathType: Prefix
            backend:
              service:
                name: market-data-service
                port:
                  number: 3004
          - path: /api/v1/exchange
            pathType: Prefix
            backend:
              service:
                name: exchange-service
                port:
                  number: 3005
          - path: /api/v1/remittance
            pathType: Prefix
            backend:
              service:
                name: remittance-service
                port:
                  number: 3006
          - path: /api/v1/earn
            pathType: Prefix
            backend:
              service:
                name: earn-service
                port:
                  number: 3007
          - path: /api/v1/compliance
            pathType: Prefix
            backend:
              service:
                name: compliance-service
                port:
                  number: 3008
