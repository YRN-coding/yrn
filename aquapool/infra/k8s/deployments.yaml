---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: aquapool
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: aquapool/auth-service:latest
          ports:
            - containerPort: 3001
          envFrom:
            - configMapRef:
                name: aquapool-config
            - secretRef:
                name: aquapool-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
